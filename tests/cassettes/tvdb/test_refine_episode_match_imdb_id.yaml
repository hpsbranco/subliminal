      string: "{\"data\":[{\"aliases\":[\"Blue Bloods - Crime Scene New York\",\"Familia
        de Polic\xEDas\",\"\u57F7\u6CD5\u5C0A\u5BB6\"],\"banner\":\"/banners/posters/164981-1.jpg\",\"firstAired\":null,\"id\":164981,\"network\":\"CBS\",\"overview\":\"Blue
        Bloods is a drama about a multi-generational family of cops dedicated to New
        York City law enforcement. Frank Reagan is the New York Police Commissioner
        and heads both the police force and the Reagan brood. He runs his department
        as diplomatically as he runs his family, even when dealing with the politics
        that plagued his unapologetically bold father, Henry, during his stint as
        Chief.\",\"seriesName\":\"Blue Bloods\",\"slug\":\"blue-bloods\",\"status\":\"Continuing\"},{\"aliases\":[],\"banner\":\"/bannershttps://beta.thetvdb.com/images/missing/movie.jpg\",\"firstAired\":null,\"id\":280905,\"network\":\"ZDF\",\"seriesName\":\"Blue
        Blood\",\"slug\":\"blue-blood\",\"status\":\"Ended\"},{\"aliases\":[\"Red
        vs Blue: The Blood Gulch Chronicles\",\"Red vs Blue The Blood Gulch Chronicles\",\"Red
        vs Blue\",\"RvB\",\"Red vs. Blue: The Blood Gulch Chronicles\"],\"banner\":\"/banners/posters/78896-4.jpg\",\"firstAired\":null,\"id\":78896,\"network\":\"Rooster
        Teeth\",\"overview\":\"Red vs. Blue centers on the Red and Blue Teams, two
        groups of soldiers engaged in a civil war. Each team occupies a small base
        in a box canyon known as Blood Gulch. According to Simmons (Gustavo Sorola),
        one of the Red Team soldiers, each team's base exists only in response to
        the other team's base. Although both teams generally dislike each other and
        have standing orders to defeat their opponents and capture their flag, neither
        team's soldiers are usually motivated to fight each other- if they are otherwise,
        neither are efficient. Teammates have an array of eccentric personalities
        and often create more problems for each other than for their enemies.\",\"seriesName\":\"Red
        vs. Blue\",\"slug\":\"red-vs-blue\",\"status\":\"Continuing\"},{\"aliases\":[],\"banner\":\"/banners/posters/83068-2.jpg\",\"firstAired\":\"2008-8-20\",\"id\":83068,\"network\":\"BBC
        Four\",\"overview\":\"Today, astonishing surgical breakthroughs are making
        face transplants, limb transplants and a host of other previously undreamed
        of operations possible. But getting here has not been a simple story of selfless
        men working tirelessly in the pursuit of medical advancement. Instead it\u2019s
        a bloodstained tale of blunders, arrogance, mishap and murder. In trying to
        keep us alive, surgeons have all too often killed us off, and life-saving
        solutions have often come from the most surprising places.\\r\\nBlood and
        Guts is an incredible story of stolen corpses, medical fraud, lobotomized
        patients \u2013 and every now and then courageous advances that have saved
        the lives of millions around the world.\\r\\nYou may think twice before going
        under the knife\u2026\",\"seriesName\":\"Blood and Guts: A History of Surgery\",\"slug\":\"blood-and-guts-a-history-of-surgery\",\"status\":\"Ended\"},{\"aliases\":[],\"banner\":\"/banners/posters/271023-1.jpg\",\"firstAired\":null,\"id\":271023,\"network\":\"SWR\",\"overview\":\"Blood
        and Honor: Youth Under Hitler, 1982 (aka Blut und Ehre: Jugend Unter Hitler)
        is a German/American made for TV mini-series which was a co-production between
        Daniel Wilson Productions and S.W.F (Sudwestfunk) and Taurus Films. \\r\\nThe
        original screenplay was by Helmut Kissel and was partly based on his own experience
        as a member of the Hitler Youth. The scripts that were eventually shot, however,
        were written by Robert Muller.  Helmut Kissel led as the director of the project
        but was replaced by Bernd Fischerauer within the first couple of weeks when
        shooting started. The shooting was on location in Baden-Baden, West Germany
        with the first 4 weeks in August 1980 and the rest of the production was completed
        between January through March in 1981.\\r\\nEach scene was shot both in English
        and in German and resulted in two versions of the film. The post production
        of the German version was completed in spring of 1982. It premiered on West
        German TV in July 1982 and was watched by more than 50% of the available audience.
        The American version premiered in November 1982 on various independent television
        stations in the United States (KBHK-44, WPIX-TV, etc.). Blood and Honor: Youth
        Under Hitler also received a Peabody Award in 1982 and was shown in 7 countries,
        including the Netherlands, UK, Austria, and Israel.\",\"seriesName\":\"Blood
        and Honor: Youth Under Hitler\",\"slug\":\"blood-and-honor-youth-under-hitler\",\"status\":\"Ended\"},{\"aliases\":[],\"banner\":\"/banners/posters/132041-1.jpg\",\"firstAired\":\"2008-4-22\",\"id\":132041,\"network\":\"BBC
        Three\",\"overview\":\"Six young fashion lovers swap shopping for the factories
        and backstreet workshops of India to learn how the clothes they wear are manufactured.
        \",\"seriesName\":\"Blood Sweat And T-shirts\",\"slug\":\"blood-sweat-and-t-shirts\",\"status\":\"Ended\"}]}"
